<section>

  <h1>Login</h1>

  <form id="login-form">

    <input
      id="email"
      type="email"
      placeholder="Email"
      required
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

  <button id="go-register-btn" type="button">
    Crear cuenta de cliente
  </button>

  <p id="mensaje"></p>

</section>
