<section class="auth-page">
  <div class="auth-card">
    <h1>Ticket System</h1>
    <p>Inicia sesión para continuar</p>

    <form id="login-form" class="auth-form">
      <input
        id="email"
        type="email"
        placeholder="Email"
        required
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
        required
      >

      <button type="submit" class="btn btn-primary">
        Login
      </button>
    </form>

    <button id="go-register-btn" type="button" class="btn btn-secondary auth-secondary-btn">
      Crear cuenta de cliente
    </button>

    <p id="mensaje"></p>
  </div>
</section>
