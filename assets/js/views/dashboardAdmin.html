<section class="admin-dashboard">
  <header class="topbar">
    <div>
      <h1 class="topbar-title">Panel Administrador</h1>
      <p class="topbar-subtitle">Gestión general de tickets</p>
    </div>

    <div class="topbar-actions">
      <div class="user-chip">
        <span class="user-name">Admin</span>
        <span class="user-role">ADMIN</span>
      </div>

      <button id="logout-btn" class="btn btn-danger">
        Cerrar sesión
      </button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="panel form-panel">
      <div class="panel-header">
        <h2>Crear Ticket</h2>
        <p>Registra o edita tickets del sistema</p>
      </div>

      <form id="ticket-form" class="ticket-form">
        <div class="form-group">
          <label for="ticket-name">Nombre del ticket</label>
          <input
            id="ticket-name"
            type="text"
            placeholder="Nombre ticket"
            required
          >
        </div>

        <div class="form-group">
          <label for="ticket-type">Tipo</label>
          <select id="ticket-type" required>
            <option value="">Seleccione un tipo</option>
            <option value="incidente">Incidente</option>
            <option value="requerimiento">Requerimiento</option>
            <option value="soporte">Soporte</option>
          </select>
        </div>

        <div class="form-group">
          <label for="technician-select">Técnico asignado</label>
          <select id="technician-select"></select>
        </div>

        <div class="form-group">
          <label for="status-select">Estado</label>
          <select id="status-select"></select>
        </div>

        <div class="form-group">
          <label for="client-select">Cliente</label>
          <select id="client-select"></select>
        </div>

        <div class="form-group">
          <label for="ticket-description">Descripción</label>
          <textarea
            id="ticket-description"
            placeholder="Descripción"
            required
          ></textarea>
        </div>

        <button type="submit" class="btn btn-primary">
          Guardar Ticket
        </button>
      </form>
    </aside>

    <main class="panel list-panel">
      <div class="panel-header">
        <h2>Lista de Tickets</h2>
        <p>Tablero general del administrador</p>
      </div>

      <div id="tickets-container"></div>
    </main>
  </div>
</section>
